<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="BMC IT Club Bhairahawa">
    <meta name="keywords"
        content="Code Olympiad 2081, BMC IT Club, coding competition Nepal, Bhairahawa IT event, programming contest">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Code Olympiad 2081">
    <meta property="og:image" content="https://codeolympiad2081.netlify.app/assets/images/og-image.png">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://codeolympiad2081.netlify.app/assets/images/og-image.png">

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/bmc-it-club-circle-logo.ico">

    <title>Fight Club | Code Olympiad 2081</title>
    <meta name="description"
        content="Fight Club challenge of Code Olympiad 2081 where teams compete in intense problem-solving battles.">

    <meta property="og:title" content="Fight Club | Code Olympiad 2081">
    <meta property="og:url" content="https://codeolympiad2081.netlify.app/assets/html/fight-club">


    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;

        }

        .fight-club-container {
            text-align: center;
            background: linear-gradient(135deg, #2c2c2c, #000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-shadow: 0 0 5px #ff0066, 0 0 10px #ff0066;
            color: #f5f5f5;
            animation: fadeIn 2s ease-in-out;
        }

        .fight-club-container h1,
        .fight-club-container h2 {
            margin: 0.5em 0;
            text-transform: uppercase;
        }

        .fight-club-container h1 {
            font-size: 3rem;
            color: #ff0066;
            animation: glitch 2s infinite;
        }

        .fight-club-container h2 {
            font-size: 1.5rem;
            color: #999;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes glitch {

            0%,
            100% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-2px, 2px);
            }

            20% {
                transform: translate(2px, -2px);
            }

            30% {
                transform: translate(-2px, -2px);
            }

            40% {
                transform: translate(2px, 2px);
            }
        }

        .fight-club-container .rule {
            margin-top: 2rem;
            font-style: italic;
            font-size: 1.2rem;
            color: #ddd;
        }
    </style>
</head>

<body>
    <div class="fight-club-container">
        <h1>Fight Club</h1>
        <h2>The first rule of Fight Club is: you do not talk about Fight Club.</h2>
        <p class="rule">"It's only after we've lost everything that we're free to do anything."</p>
        <button id="sound"> Sound</button>
        <audio autoplay loop hidden src="..//music/The Pixies - Where Is My Mind (Fight Club song).mp3"
            type="audio/mpeg" id="fight-club-audio"></audio>
    </div>
    <script>
        document.getElementById("sound").addEventListener("click", () => {
            document.getElementById("fight-club-audio").play();
            document.getElementById("sound").style.display = "none";
        });
    </script>
</body>

</html>
