<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="BMC IT Club Bhairahawa">
    <meta name="keywords"
        content="Code Olympiad 2081, BMC IT Club, coding competition Nepal, Bhairahawa IT event, programming contest">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Code Olympiad 2081">
    <meta property="og:image" content="https://codeolympiad2081.netlify.app/assets/images/og-image.png">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://codeolympiad2081.netlify.app/assets/images/og-image.png">

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/bmc-it-club-circle-logo.ico">

    <title>Group B Output Round | Code Olympiad 2081</title>
    <meta name="description"
        content="Group B Output round of Code Olympiad 2081 focusing on logic, algorithms, and coding fundamentals.">

    <meta property="og:title" content="Group B Output | Code Olympiad 2081">
    <meta property="og:url" content="https://codeolympiad2081.netlify.app/assets/html/groupboutput">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }

        header {
            background: #1f1f1f;
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #0077ff;
        }

        header h1 {
            margin: 0;
            color: #00d4ff;
        }

        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 15px;
        }

        .folder {
            width: 100%;
            margin-bottom: 20px;
        }

        .folder h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .photo-grid img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .photo-grid img:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #aaaaaa;
            font-size: 0.9rem;
            background: #1f1f1f;
            border-top: 3px solid #0077ff;
        }
    </style>
</head>

<body>
    <header>
        <h1>Group B Output prediction</h1>
    </header>
    <main class="gallery-container">
        <div id="gallery"></div>
    </main>
    <footer>
        <p>&copy; 2025 Code Olympiad 2081. All rights reserved.</p>
    </footer>
    <script>
        const folders = ["./OutputB/C", "./OutputB/Python", "./OutputB/Javascript", "./OutputB/Java"];
        const gallery = document.getElementById("gallery");

        folders.forEach(folder => {
            const folderName = folder.split("/").pop();
            const section = document.createElement("section");
            section.classList.add("folder");

            const title = document.createElement("h2");
            title.textContent = folderName;
            section.appendChild(title);

            const grid = document.createElement("div");
            grid.classList.add("photo-grid");
            section.appendChild(grid);

            const images = ["11.png", "12.png", "13.png", "14.png", "15.png", "16.png", "17.png", "18.png", "19.png", "20.png"];
            images.forEach(image => {
                const img = document.createElement("img");
                img.src = `${folder}/${image}`;
                img.alt = `Photo from ${folderName}`;
                grid.appendChild(img);
            });

            gallery.appendChild(section);
        });

    </script>
</body>

</html>
